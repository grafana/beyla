name: Deploy alloy-beyla to dev wave

on:
  workflow_call:
    inputs:
      beyla_version:
        description: "Beyla version tag embedded in the image (e.g. v3.15.0)"
        required: true
        type: string
      tag_suffix:
        description: "Optional rebuild suffix appended as -<suffix> (e.g. 1, 2)"
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      beyla_version:
        description: "Beyla version tag embedded in the image (e.g. v3.15.0)"
        required: true
        type: string
      tag_suffix:
        description: "Optional rebuild suffix appended as -<suffix> (e.g. 1, 2). Leave empty for the first build."
        required: false
        type: string
        default: ""

permissions: {}

jobs:
  update-deployment-tools:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Beyla at version tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.beyla_version }}
          persist-credentials: false

      - name: Derive image tag and Beyla SHA
        id: tag
        env:
          BEYLA_VERSION: ${{ inputs.beyla_version }}
          TAG_SUFFIX: ${{ inputs.tag_suffix }}
        run: |
          set -euo pipefail
          VERSION="${BEYLA_VERSION#v}"
          if [[ -n "${TAG_SUFFIX}" ]]; then
            IMAGE_TAG="${VERSION}-${TAG_SUFFIX}"
          else
            IMAGE_TAG="${VERSION}"
          fi
          SHORT_SHA="$(git rev-parse --short HEAD)"
          echo "image_tag=${IMAGE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "short_sha=${SHORT_SHA}" >> "${GITHUB_OUTPUT}"
          echo "alloy-beyla dev image tag: ${IMAGE_TAG}, beyla short SHA: ${SHORT_SHA}"

      - name: Log in to Google Artifact Registry
        uses: grafana/shared-workflows/actions/login-to-gar@00646b30431b955ec3c00982b23b1eeb7b66445b # v1.0.0

      - name: Get updater-app secrets from Vault
        uses: grafana/shared-workflows/actions/get-vault-secrets@a37de51f3d713a30a9e4b21bcdfbd38170020593 # get-vault-secrets/v1.3.0
        with:
          common_secrets: |
            APP_ID=updater-app:app-id
            APP_PRIVATE_KEY=updater-app:private-key

      - name: Get GitHub App token for deployment_tools
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        id: get-github-app-token
        with:
          app-id: ${{ env.APP_ID }}
          private-key: ${{ env.APP_PRIVATE_KEY }}
          owner: grafana
          repositories: deployment_tools

      - name: Update deployment_tools alloy-beyla dev wave
        env:
          GITHUB_TOKEN: ${{ steps.get-github-app-token.outputs.token }}
          IMAGE_TAG: ${{ steps.tag.outputs.image_tag }}
          SHORT_SHA: ${{ steps.tag.outputs.short_sha }}
        # zizmor: ignore[template-injection] CONFIG_JSON is locally generated and passed as plain string
        run: |
          set -euo pipefail

          cat << EOF > config.json
          {
            "repo_owner": "grafana",
            "repo_name": "deployment_tools",
            "destination_branch": "master",
            "pull_request_branch_prefix": "auto-merge/alloy-beyla-dev",
            "pull_request_enabled": true,
            "pull_request_existing_strategy": "replace",
            "pull_request_message": "Update alloy-beyla dev wave to ${IMAGE_TAG}. Triggered by https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "pull_request_team_reviewers": ["ebpf"],
            "update_jsonnet_attribute_configs": [
              {
                "file_path": "ksonnet/environments/beyla/alloy_beyla_versions.libsonnet",
                "jsonnet_key_path": "dev.container_image_tag",
                "jsonnet_value": "${IMAGE_TAG}"
              },
              {
                "file_path": "ksonnet/environments/beyla/alloy_beyla_versions.libsonnet",
                "jsonnet_key_path": "dev.release_git_tag",
                "jsonnet_value": "${SHORT_SHA}"
              }
            ]
          }
          EOF

          docker run --rm \
          -e GITHUB_TOKEN="$GITHUB_TOKEN" \
          -e CONFIG_JSON="$(cat config.json)" \
          us-docker.pkg.dev/grafanalabs-global/docker-deployment-tools-prod/updater |& tee updater-output.log
