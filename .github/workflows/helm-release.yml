name: Release Helm chart
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-beyla-helm-chart:
    uses: grafana/helm-charts/.github/workflows/update-helm-repo.yaml@hackathon-17-verify-all-the-charts
    permissions:
      contents: "write"
      id-token: "write"
      packages: "write"
    with:
      github_app: grafana-beyla-bot
      charts_dir: charts/beyla
      cr_configfile: .github/configs/cr.yml
      ct_configfile: .github/configs/ct.yml
