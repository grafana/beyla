name: Promote patch to stable release

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version tag to promote (e.g., v3.3.1)'
        required: true
        type: string
      dry_run:
        description: 'Dry run mode (validate only, make no changes)'
        required: false
        type: boolean
        default: false

concurrency:
  group: promote-patch-${{ inputs.version_tag }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version_tag: ${{ steps.derive.outputs.version_tag }}
      docker_patch_tag: ${{ steps.derive.outputs.docker_patch_tag }}
      docker_minor_tag: ${{ steps.derive.outputs.docker_minor_tag }}
      docker_major_tag: ${{ steps.derive.outputs.docker_major_tag }}
      obi_tag: ${{ steps.obi.outputs.obi_tag }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: 'false'

      - name: Validate and derive tags
        id: derive
        env:
          VERSION_TAG: ${{ inputs.version_tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Validate tag format: vMAJOR.MINOR.PATCH (no pre-release suffix)
          if [[ ! "${VERSION_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid tag format: ${VERSION_TAG}. Expected format: vX.Y.Z (e.g., v3.3.1)"
            exit 1
          fi

          # Derive version components
          VERSION="${VERSION_TAG#v}"
          MAJOR="${VERSION%%.*}"
          MINOR_PATCH="${VERSION#*.}"
          MINOR="${MINOR_PATCH%%.*}"

          # Docker image tags (no v prefix)
          DOCKER_PATCH_TAG="${VERSION}"
          DOCKER_MINOR_TAG="${MAJOR}.${MINOR}"
          DOCKER_MAJOR_TAG="${MAJOR}"

          echo "Version tag:      ${VERSION_TAG}"
          echo "Docker patch tag: ${DOCKER_PATCH_TAG}"
          echo "Docker tags:      ${DOCKER_PATCH_TAG}, ${DOCKER_MINOR_TAG}, ${DOCKER_MAJOR_TAG}, latest"

          # Verify git tag exists
          if ! git rev-parse "refs/tags/${VERSION_TAG}" >/dev/null 2>&1; then
            echo "::error::Tag ${VERSION_TAG} does not exist in git"
            exit 1
          fi

          # Verify GitHub release exists (gh release view --json has no isLatest; use API for latest)
          if ! RELEASE_JSON=$(gh release view "${VERSION_TAG}" \
            --repo "${{ github.repository }}" \
            --json tagName,isPrerelease 2>/dev/null); then
            echo "::error::GitHub release for ${VERSION_TAG} not found"
            exit 1
          fi

          IS_PRERELEASE=$(echo "${RELEASE_JSON}" | jq -r '.isPrerelease')
          IS_LATEST=false
          if LATEST_JSON=$(gh api "repos/${{ github.repository }}/releases/latest" 2>/dev/null); then
            LATEST_TAG=$(echo "${LATEST_JSON}" | jq -r '.tag_name')
            if [[ "${LATEST_TAG}" == "${VERSION_TAG}" ]]; then
              IS_LATEST=true
            fi
          fi

          # Idempotency: if already promoted, log and continue
          if [[ "${IS_PRERELEASE}" != "true" ]] && [[ "${IS_LATEST}" == "true" ]]; then
            echo "::notice::Release ${VERSION_TAG} is already marked as stable/latest (idempotent re-run)"
          elif [[ "${IS_PRERELEASE}" != "true" ]]; then
            echo "::warning::Release ${VERSION_TAG} is not a pre-release but also not latest. Will proceed to set as latest."
          fi

          # Set outputs
          {
            echo "version_tag=${VERSION_TAG}"
            echo "docker_patch_tag=${DOCKER_PATCH_TAG}"
            echo "docker_minor_tag=${DOCKER_MINOR_TAG}"
            echo "docker_major_tag=${DOCKER_MAJOR_TAG}"
          } >> "${GITHUB_OUTPUT}"

      - name: Resolve OBI tag from submodule
        id: obi
        env:
          VERSION_TAG: ${{ steps.derive.outputs.version_tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Read the OBI submodule SHA pinned at the Beyla release tag.
          OBI_SHA=$(git ls-tree "refs/tags/${VERSION_TAG}" .obi-src | awk '{print $3}')
          if [[ -z "${OBI_SHA}" ]]; then
            echo "::error::Could not read OBI submodule SHA at ${VERSION_TAG}"
            exit 1
          fi
          echo "OBI submodule SHA at ${VERSION_TAG}: ${OBI_SHA}"

          # Find a tag in the OBI repo whose commit SHA matches the submodule pin.
          OBI_TAGS=$(gh api --paginate \
            repos/grafana/opentelemetry-ebpf-instrumentation/tags \
            --jq ".[] | select(.commit.sha == \"${OBI_SHA}\") | .name")
          OBI_TAG="${OBI_TAGS%%$'\n'*}"

          if [[ -z "${OBI_TAG}" ]]; then
            echo "::error::OBI submodule SHA ${OBI_SHA} at Beyla ${VERSION_TAG} does not correspond to any tag in grafana/opentelemetry-ebpf-instrumentation"
            exit 1
          fi
          echo "OBI tag: ${OBI_TAG}"

          # Verify the OBI release exists.
          if ! gh release view "${OBI_TAG}" \
            --repo grafana/opentelemetry-ebpf-instrumentation \
            --json tagName >/dev/null 2>&1; then
            echo "::error::OBI release ${OBI_TAG} not found in grafana/opentelemetry-ebpf-instrumentation"
            exit 1
          fi

          echo "obi_tag=${OBI_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Print promotion summary
        env:
          VERSION_TAG: ${{ steps.derive.outputs.version_tag }}
          DOCKER_PATCH_TAG: ${{ steps.derive.outputs.docker_patch_tag }}
          DOCKER_MINOR_TAG: ${{ steps.derive.outputs.docker_minor_tag }}
          DOCKER_MAJOR_TAG: ${{ steps.derive.outputs.docker_major_tag }}
          OBI_TAG: ${{ steps.obi.outputs.obi_tag }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          {
            echo "## Promotion Summary"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Version tag | \`${VERSION_TAG}\` |"
            echo "| Docker source tag | \`${DOCKER_PATCH_TAG}\` |"
            echo "| Docker new tags | \`latest\`, \`${DOCKER_MINOR_TAG}\`, \`${DOCKER_MAJOR_TAG}\` |"
            echo "| OBI tag | \`${OBI_TAG}\` |"
            echo "| Dry run | \`${DRY_RUN}\` |"
            echo ""
            if [[ "${DRY_RUN}" == "true" ]]; then
              echo "> **Dry run mode:** No changes will be made."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

  promote:
    needs: validate
    if: inputs.dry_run == false
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      actions: write
    steps:
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Log into GAR
        uses: grafana/shared-workflows/actions/login-to-gar@c7ad5f57693ac858c698d95783685a9cbfd91223 # login-to-gar/v1.0.1
        with:
          registry: us-docker.pkg.dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Re-tag Docker images
        env:
          DOCKER_PATCH_TAG: ${{ needs.validate.outputs.docker_patch_tag }}
          DOCKER_MINOR_TAG: ${{ needs.validate.outputs.docker_minor_tag }}
          DOCKER_MAJOR_TAG: ${{ needs.validate.outputs.docker_major_tag }}
        run: |
          set -euo pipefail
          for IMAGE in us-docker.pkg.dev/grafanalabs-global/dockerhub-beyla-prod-mirror/beyla us-docker.pkg.dev/grafanalabs-global/dockerhub-beyla-prod-mirror/beyla-k8s-cache; do
            echo "Re-tagging ${IMAGE}:${DOCKER_PATCH_TAG} -> latest, ${DOCKER_MINOR_TAG}, ${DOCKER_MAJOR_TAG}"
            docker buildx imagetools create \
              --tag "${IMAGE}:latest" \
              --tag "${IMAGE}:${DOCKER_MINOR_TAG}" \
              --tag "${IMAGE}:${DOCKER_MAJOR_TAG}" \
              "${IMAGE}:${DOCKER_PATCH_TAG}"
          done

      - name: Verify Docker image digests
        env:
          DOCKER_PATCH_TAG: ${{ needs.validate.outputs.docker_patch_tag }}
          DOCKER_MINOR_TAG: ${{ needs.validate.outputs.docker_minor_tag }}
          DOCKER_MAJOR_TAG: ${{ needs.validate.outputs.docker_major_tag }}
        run: |
          set -euo pipefail
          for IMAGE in us-docker.pkg.dev/grafanalabs-global/dockerhub-beyla-prod-mirror/beyla us-docker.pkg.dev/grafanalabs-global/dockerhub-beyla-prod-mirror/beyla-k8s-cache; do
            SOURCE_DIGEST=$(docker buildx imagetools inspect "${IMAGE}:${DOCKER_PATCH_TAG}" | awk '/^Digest:/{print $2}')
            echo "${IMAGE}:${DOCKER_PATCH_TAG} digest: ${SOURCE_DIGEST}"
            for TAG in "latest" "${DOCKER_MINOR_TAG}" "${DOCKER_MAJOR_TAG}"; do
              PROMOTED_DIGEST=$(docker buildx imagetools inspect "${IMAGE}:${TAG}" | awk '/^Digest:/{print $2}')
              if [[ "${SOURCE_DIGEST}" != "${PROMOTED_DIGEST}" ]]; then
                echo "::error::Digest mismatch for ${IMAGE}:${TAG} (expected ${SOURCE_DIGEST}, got ${PROMOTED_DIGEST})"
                exit 1
              fi
              echo "Verified ${IMAGE}:${TAG} digest matches source"
            done
          done

      - name: Update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_TAG: ${{ needs.validate.outputs.version_tag }}
        run: |
          set -euo pipefail
          echo "Promoting ${VERSION_TAG} to stable/latest"
          gh release edit "${VERSION_TAG}" \
            --repo "${{ github.repository }}" \
            --prerelease=false \
            --latest
          echo "GitHub release ${VERSION_TAG} updated to stable/latest"

      - name: Print summary
        env:
          VERSION_TAG: ${{ needs.validate.outputs.version_tag }}
          DOCKER_PATCH_TAG: ${{ needs.validate.outputs.docker_patch_tag }}
          DOCKER_MINOR_TAG: ${{ needs.validate.outputs.docker_minor_tag }}
          DOCKER_MAJOR_TAG: ${{ needs.validate.outputs.docker_major_tag }}
        run: |
          {
            echo "## Promotion Complete"
            echo ""
            echo "### Docker Images"
            echo "- \`us-docker.pkg.dev/grafanalabs-global/dockerhub-beyla-prod-mirror/beyla:${DOCKER_PATCH_TAG}\`, \`:${DOCKER_MINOR_TAG}\`, \`:${DOCKER_MAJOR_TAG}\`, \`:latest\`"
            echo "- \`us-docker.pkg.dev/grafanalabs-global/dockerhub-beyla-prod-mirror/beyla-k8s-cache:${DOCKER_PATCH_TAG}\`, \`:${DOCKER_MINOR_TAG}\`, \`:${DOCKER_MAJOR_TAG}\`, \`:latest\`"
            echo ""
            echo "### GitHub Release"
            echo "- [${VERSION_TAG}](https://github.com/${{ github.repository }}/releases/tag/${VERSION_TAG}) marked as stable/latest"
            echo ""
            echo "### Automated Follow-up"
            echo "- [x] Helm chart bump workflow triggered (check the workflow run for status)"
            echo "- [x] Alloy Beyla component update workflow triggered (check [grafana/alloy actions](https://github.com/grafana/alloy/actions/workflows/agent_bump_beyla.yml) for status)"
            echo ""
            echo "### Manual Follow-up"
            echo "- [ ] Trigger [Helm release workflow](https://github.com/${{ github.repository }}/actions/workflows/helm-release.yml) after the chart bump PR merges"
          } >> "${GITHUB_STEP_SUMMARY}"

  bump-helm-chart:
    needs: [validate, promote]
    if: inputs.dry_run == false
    uses: ./.github/workflows/helm-chart-bump.yml
    with:
      version_tag: ${{ needs.validate.outputs.version_tag }}
    permissions:
      contents: read
      pull-requests: write
      id-token: write

  trigger-alloy-bump:
    needs: [validate, promote]
    if: inputs.dry_run == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Get GitHub App token
        id: get-github-app-token
        uses: grafana/shared-workflows/actions/create-github-app-token@ae92934a14a48b94494dbc06d74a81d47fe08a40 # create-github-app-token/v0.2.2
        with:
          github_app: grafana-beyla-bot
          permission_set: trigger-alloy-bump

      - name: Trigger Alloy Beyla component update
        env:
          GH_TOKEN: ${{ steps.get-github-app-token.outputs.token }}
          VERSION_TAG: ${{ needs.validate.outputs.version_tag }}
        run: |
          set -euo pipefail
          echo "Triggering Alloy Beyla component update for ${VERSION_TAG}"
          gh workflow run agent_bump_beyla.yml \
            --repo grafana/alloy \
            --ref main \
            -f beyla_release_tag="${VERSION_TAG}"
          echo "Alloy bump workflow triggered"

  promote-obi:
    needs: [validate, promote]
    if: inputs.dry_run == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Get GitHub App token
        id: get-github-app-token
        uses: grafana/shared-workflows/actions/create-github-app-token@ae92934a14a48b94494dbc06d74a81d47fe08a40 # create-github-app-token/v0.2.2
        with:
          github_app: grafana-beyla-bot
          permission_set: promote-obi-release

      - name: Promote OBI release to latest
        env:
          GH_TOKEN: ${{ steps.get-github-app-token.outputs.token }}
          OBI_TAG: ${{ needs.validate.outputs.obi_tag }}
        run: |
          set -euo pipefail
          echo "Promoting grafana/opentelemetry-ebpf-instrumentation ${OBI_TAG} to stable/latest"
          gh release edit "${OBI_TAG}" \
            --repo grafana/opentelemetry-ebpf-instrumentation \
            --prerelease=false \
            --latest
          echo "OBI release ${OBI_TAG} updated to stable/latest"

      - name: Print summary
        env:
          OBI_TAG: ${{ needs.validate.outputs.obi_tag }}
        run: |
          {
            echo "## OBI Promotion Complete"
            echo ""
            echo "- [${OBI_TAG}](https://github.com/grafana/opentelemetry-ebpf-instrumentation/releases/tag/${OBI_TAG}) marked as stable/latest"
          } >> "${GITHUB_STEP_SUMMARY}"
