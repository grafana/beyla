name: Promote RC to stable release

on:
  workflow_dispatch:
    inputs:
      rc_tag:
        description: 'RC tag to promote (e.g., v3.0.0-rc5)'
        required: true
        type: string
      dry_run:
        description: 'Dry run mode (validate only, make no changes)'
        required: false
        type: boolean
        default: false

concurrency:
  group: promote-rc-${{ inputs.rc_tag }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      rc_tag: ${{ steps.derive.outputs.rc_tag }}
      stable_tag: ${{ steps.derive.outputs.stable_tag }}
      rc_sha: ${{ steps.derive.outputs.rc_sha }}
      docker_rc_tag: ${{ steps.derive.outputs.docker_rc_tag }}
      docker_patch_tag: ${{ steps.derive.outputs.docker_patch_tag }}
      docker_minor_tag: ${{ steps.derive.outputs.docker_minor_tag }}
      docker_major_tag: ${{ steps.derive.outputs.docker_major_tag }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
          persist-credentials: 'false'

      - name: Validate and derive tags
        id: derive
        env:
          RC_TAG: ${{ inputs.rc_tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Validate RC tag format: vMAJOR.MINOR.PATCH-rcN
          if [[ ! "${RC_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc[0-9]+$ ]]; then
            echo "::error::Invalid RC tag format: ${RC_TAG}. Expected format: vX.Y.Z-rcN (e.g., v3.0.0-rc5)"
            exit 1
          fi

          # Derive stable tag by stripping -rcN suffix
          STABLE_TAG="${RC_TAG%%-rc*}"
          VERSION="${STABLE_TAG#v}"
          MAJOR="${VERSION%%.*}"
          MINOR_PATCH="${VERSION#*.}"
          MINOR="${MINOR_PATCH%%.*}"

          # Docker image tags (no v prefix)
          DOCKER_RC_TAG="${RC_TAG#v}"
          DOCKER_PATCH_TAG="${VERSION}"
          DOCKER_MINOR_TAG="${MAJOR}.${MINOR}"
          DOCKER_MAJOR_TAG="${MAJOR}"

          echo "RC tag:           ${RC_TAG}"
          echo "Stable tag:       ${STABLE_TAG}"
          echo "Docker RC tag:    ${DOCKER_RC_TAG}"
          echo "Docker tags:      ${DOCKER_PATCH_TAG}, ${DOCKER_MINOR_TAG}, ${DOCKER_MAJOR_TAG}"

          # Verify RC tag exists in git
          if ! git rev-parse "refs/tags/${RC_TAG}" >/dev/null 2>&1; then
            echo "::error::RC tag ${RC_TAG} does not exist in git"
            exit 1
          fi
          RC_SHA=$(git rev-parse "refs/tags/${RC_TAG}^{commit}")
          echo "RC SHA:           ${RC_SHA}"

          # If stable tag already exists, verify it points to the same commit (idempotent re-run)
          if git rev-parse "refs/tags/${STABLE_TAG}" >/dev/null 2>&1; then
            EXISTING_SHA=$(git rev-parse "refs/tags/${STABLE_TAG}^{commit}")
            if [[ "${EXISTING_SHA}" != "${RC_SHA}" ]]; then
              echo "::error::Stable tag ${STABLE_TAG} already exists at ${EXISTING_SHA}, but RC points to ${RC_SHA}. Aborting to prevent overwrite."
              exit 1
            fi
            echo "::notice::Stable tag ${STABLE_TAG} already exists at the correct commit (idempotent re-run)"
          fi

          # Verify RC GitHub release exists and is a pre-release
          RELEASE_JSON=$(gh release view "${RC_TAG}" --json tagName,isPrerelease 2>&1) || {
            echo "::error::GitHub release for ${RC_TAG} not found"
            exit 1
          }

          IS_PRERELEASE=$(echo "${RELEASE_JSON}" | jq -r '.isPrerelease')
          if [[ "${IS_PRERELEASE}" != "true" ]]; then
            echo "::error::Release ${RC_TAG} is not marked as a pre-release"
            exit 1
          fi

          # Verify RC Docker images exist
          for IMAGE in grafana/beyla grafana/beyla-k8s-cache; do
            if ! docker buildx imagetools inspect "${IMAGE}:${DOCKER_RC_TAG}" >/dev/null 2>&1; then
              echo "::error::Docker image ${IMAGE}:${DOCKER_RC_TAG} not found"
              exit 1
            fi
            echo "Verified ${IMAGE}:${DOCKER_RC_TAG} exists"
          done

          # Set outputs
          {
            echo "rc_tag=${RC_TAG}"
            echo "stable_tag=${STABLE_TAG}"
            echo "rc_sha=${RC_SHA}"
            echo "docker_rc_tag=${DOCKER_RC_TAG}"
            echo "docker_patch_tag=${DOCKER_PATCH_TAG}"
            echo "docker_minor_tag=${DOCKER_MINOR_TAG}"
            echo "docker_major_tag=${DOCKER_MAJOR_TAG}"
          } >> "${GITHUB_OUTPUT}"

      - name: Print promotion summary
        env:
          RC_TAG: ${{ steps.derive.outputs.rc_tag }}
          STABLE_TAG: ${{ steps.derive.outputs.stable_tag }}
          RC_SHA: ${{ steps.derive.outputs.rc_sha }}
          DOCKER_RC_TAG: ${{ steps.derive.outputs.docker_rc_tag }}
          DOCKER_PATCH_TAG: ${{ steps.derive.outputs.docker_patch_tag }}
          DOCKER_MINOR_TAG: ${{ steps.derive.outputs.docker_minor_tag }}
          DOCKER_MAJOR_TAG: ${{ steps.derive.outputs.docker_major_tag }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          {
            echo "## Promotion Summary"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| RC tag | \`${RC_TAG}\` |"
            echo "| Stable tag | \`${STABLE_TAG}\` |"
            echo "| Commit SHA | \`${RC_SHA}\` |"
            echo "| Docker RC tag | \`${DOCKER_RC_TAG}\` |"
            echo "| Docker stable tags | \`${DOCKER_PATCH_TAG}\`, \`${DOCKER_MINOR_TAG}\`, \`${DOCKER_MAJOR_TAG}\` |"
            echo "| Dry run | \`${DRY_RUN}\` |"
            echo ""
            if [[ "${DRY_RUN}" == "true" ]]; then
              echo "> **Dry run mode:** No changes will be made."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

  # Build Docker images from source at the RC commit with the stable version string.
  # This is a matrix job that builds each image/architecture combination on a native runner.
  build-docker:
    needs: validate
    if: inputs.dry_run == false
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: grafana/beyla
            file: Dockerfile
            platform: linux/amd64
            runner: ubuntu-latest
            artifact_suffix: beyla-amd64
          - image: grafana/beyla
            file: Dockerfile
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            artifact_suffix: beyla-arm64
          - image: grafana/beyla-k8s-cache
            file: k8scache.Dockerfile
            platform: linux/amd64
            runner: ubuntu-latest
            artifact_suffix: k8s-cache-amd64
          - image: grafana/beyla-k8s-cache
            file: k8scache.Dockerfile
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            artifact_suffix: k8s-cache-arm64
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ needs.validate.outputs.rc_sha }}
          persist-credentials: 'false'
          submodules: 'recursive'

      - name: Login to DockerHub
        uses: grafana/shared-workflows/actions/dockerhub-login@775874934ae5e0adbc55b3e7d3571d140bcc7886

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: ./${{ matrix.file }}
          platforms: ${{ matrix.platform }}
          build-args: |
            RELEASE_VERSION=${{ needs.validate.outputs.stable_tag }}
          outputs: type=image,"name=${{ matrix.image }}",push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          touch "${{ runner.temp }}/digests/${DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: digests-${{ matrix.artifact_suffix }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # Combine per-architecture digests into multi-arch manifests with stable version tags.
  create-manifest:
    needs: [validate, build-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        include:
          - image: grafana/beyla
            artifact_prefix: beyla
          - image: grafana/beyla-k8s-cache
            artifact_prefix: k8s-cache
    steps:
      - name: Login to DockerHub
        uses: grafana/shared-workflows/actions/dockerhub-login@775874934ae5e0adbc55b3e7d3571d140bcc7886

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Download amd64 digest
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: digests-${{ matrix.artifact_prefix }}-amd64
          path: ${{ runner.temp }}/digests/amd64

      - name: Download arm64 digest
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: digests-${{ matrix.artifact_prefix }}-arm64
          path: ${{ runner.temp }}/digests/arm64

      - name: Create manifest list and push
        env:
          IMAGE: ${{ matrix.image }}
          DOCKER_PATCH_TAG: ${{ needs.validate.outputs.docker_patch_tag }}
          DOCKER_MINOR_TAG: ${{ needs.validate.outputs.docker_minor_tag }}
          DOCKER_MAJOR_TAG: ${{ needs.validate.outputs.docker_major_tag }}
          DIGESTS_DIR: ${{ runner.temp }}/digests
        run: |
          AMD64_DIGEST=$(basename "${DIGESTS_DIR}"/amd64/*)
          ARM64_DIGEST=$(basename "${DIGESTS_DIR}"/arm64/*)
          docker buildx imagetools create \
            -t "${IMAGE}:${DOCKER_PATCH_TAG}" \
            -t "${IMAGE}:${DOCKER_MINOR_TAG}" \
            -t "${IMAGE}:${DOCKER_MAJOR_TAG}" \
            "${IMAGE}@sha256:${AMD64_DIGEST}" \
            "${IMAGE}@sha256:${ARM64_DIGEST}"

  # Build binary artifacts from source at the RC commit with the stable version string.
  build-binaries:
    needs: validate
    if: inputs.dry_run == false
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ needs.validate.outputs.rc_sha }}
          persist-credentials: 'false'

      - name: Set up Go
        uses: actions/setup-go@be3c94b385c4f180051c996d336f57a34c397495 # v3.6.1
        with:
          cache: false
          go-version-file: 'go.mod'

      - name: Build binary artifact
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          RELEASE_VERSION: ${{ needs.validate.outputs.stable_tag }}
        run: make artifact

      - name: Upload binary artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: binary-linux-${{ matrix.arch }}
          path: bin/beyla.tar.gz
          if-no-files-found: error
          retention-days: 1

  # Create git tag, GitHub release, and upload binary assets.
  release:
    needs: [validate, create-manifest, build-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
          persist-credentials: 'false'
          submodules: 'recursive'

      - name: Create stable git tag
        env:
          GH_TOKEN: ${{ github.token }}
          STABLE_TAG: ${{ needs.validate.outputs.stable_tag }}
          RC_SHA: ${{ needs.validate.outputs.rc_sha }}
        run: |
          set -euo pipefail
          EXISTING_SHA=$(gh api "repos/${{ github.repository }}/git/ref/tags/${STABLE_TAG}" --jq '.object.sha' 2>/dev/null || echo "")
          if [[ "${EXISTING_SHA}" == "${RC_SHA}" ]]; then
            echo "Tag ${STABLE_TAG} already exists at ${RC_SHA}, skipping creation"
          elif [[ -n "${EXISTING_SHA}" ]]; then
            echo "::error::Tag ${STABLE_TAG} exists at ${EXISTING_SHA} but expected ${RC_SHA}"
            exit 1
          else
            echo "Creating tag ${STABLE_TAG} pointing to ${RC_SHA}"
            gh api "repos/${{ github.repository }}/git/refs" \
              -f "ref=refs/tags/${STABLE_TAG}" \
              -f "sha=${RC_SHA}"
            echo "Tag ${STABLE_TAG} created successfully"
          fi

      - name: Download binary artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: ${{ runner.temp }}/binaries

      - name: Rename binary artifacts
        env:
          STABLE_TAG: ${{ needs.validate.outputs.stable_tag }}
          BINARIES_DIR: ${{ runner.temp }}/binaries
        run: |
          set -euo pipefail
          mkdir -p assets
          for ARCH in amd64 arm64; do
            SRC="${BINARIES_DIR}/binary-linux-${ARCH}/beyla.tar.gz"
            DST="assets/beyla-linux-${ARCH}-${STABLE_TAG}.tar.gz"
            if [[ -f "${SRC}" ]]; then
              mv "${SRC}" "${DST}"
              echo "Prepared: ${DST}"
            else
              echo "::warning::Binary artifact for linux/${ARCH} not found"
            fi
          done

      - name: Generate release notes
        id: release-notes
        uses: mariomac/linked-release-notes@2a6d7503fe822c734f2b0b118f65c43a7df84202 # v0.0.7
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ needs.validate.outputs.stable_tag }}
          generated_submodule_link: open-telemetry/opentelemetry-ebpf-instrumentation

      - name: Prepare release notes
        env:
          GH_TOKEN: ${{ github.token }}
          GENERATED_NOTES: ${{ steps.release-notes.outputs.release_notes }}
          RC_TAG: ${{ needs.validate.outputs.rc_tag }}
        run: |
          set -euo pipefail
          if [[ -n "${GENERATED_NOTES}" ]]; then
            echo "${GENERATED_NOTES}" > release-notes.txt
          else
            # Fallback: use RC release notes with a promotion header
            RC_BODY=$(gh release view "${RC_TAG}" --json body -q '.body' 2>/dev/null || echo "")
            {
              echo "Promoted from ${RC_TAG}"
              echo ""
              echo "${RC_BODY}"
            } > release-notes.txt
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          STABLE_TAG: ${{ needs.validate.outputs.stable_tag }}
        run: |
          set -euo pipefail
          if gh release view "${STABLE_TAG}" >/dev/null 2>&1; then
            echo "Release ${STABLE_TAG} already exists, updating"
            gh release edit "${STABLE_TAG}" \
              --title "${STABLE_TAG}" \
              --notes-file release-notes.txt \
              --latest
          else
            gh release create "${STABLE_TAG}" \
              --title "${STABLE_TAG}" \
              --notes-file release-notes.txt \
              --latest
          fi

          for f in assets/beyla-linux-*.tar.gz; do
            if [[ -f "${f}" ]]; then
              echo "Uploading asset: ${f}"
              gh release upload "${STABLE_TAG}" "${f}" --clobber
            fi
          done
          echo "GitHub release ${STABLE_TAG} created successfully"

      - name: Print summary
        env:
          RC_TAG: ${{ needs.validate.outputs.rc_tag }}
          STABLE_TAG: ${{ needs.validate.outputs.stable_tag }}
          RC_SHA: ${{ needs.validate.outputs.rc_sha }}
          DOCKER_PATCH_TAG: ${{ needs.validate.outputs.docker_patch_tag }}
          DOCKER_MINOR_TAG: ${{ needs.validate.outputs.docker_minor_tag }}
          DOCKER_MAJOR_TAG: ${{ needs.validate.outputs.docker_major_tag }}
        run: |
          {
            echo "## Promotion Complete"
            echo ""
            echo "### Git"
            echo "- Tag \`${STABLE_TAG}\` created at commit \`${RC_SHA}\`"
            echo "- [View release](https://github.com/${{ github.repository }}/releases/tag/${STABLE_TAG})"
            echo ""
            echo "### Docker Images"
            echo "- \`grafana/beyla:${DOCKER_PATCH_TAG}\`, \`grafana/beyla:${DOCKER_MINOR_TAG}\`, \`grafana/beyla:${DOCKER_MAJOR_TAG}\`"
            echo "- \`grafana/beyla-k8s-cache:${DOCKER_PATCH_TAG}\`, \`grafana/beyla-k8s-cache:${DOCKER_MINOR_TAG}\`, \`grafana/beyla-k8s-cache:${DOCKER_MAJOR_TAG}\`"
            echo ""
            echo "### Manual Follow-up"
            echo "- [ ] Update \`charts/beyla/Chart.yaml\` with new \`appVersion\` and \`version\` if needed"
            echo "- [ ] Trigger [Helm release workflow](https://github.com/${{ github.repository }}/actions/workflows/helm-release.yml) if a new chart release is needed"
            echo "- [ ] Trigger [Technical docs workflow](https://github.com/${{ github.repository }}/actions/workflows/publish-technical-documentation-release.yml) if docs need publishing for this release"
          } >> "${GITHUB_STEP_SUMMARY}"
