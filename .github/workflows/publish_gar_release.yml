name: Push to GAR (release)
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      # required for GAR OIDC authentication
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: us-docker.pkg.dev/grafanalabs-global/dockerhub-beyla-prod-mirror/beyla
            file: Dockerfile
            platform: linux/amd64
            runner: ubuntu-latest
            artifact_suffix: beyla-amd64
          - image: us-docker.pkg.dev/grafanalabs-global/dockerhub-beyla-prod-mirror/beyla
            file: Dockerfile
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            artifact_suffix: beyla-arm64
          - image: us-docker.pkg.dev/grafanalabs-global/dockerhub-beyla-prod-mirror/beyla-k8s-cache
            file: k8scache.Dockerfile
            platform: linux/amd64
            runner: ubuntu-latest
            artifact_suffix: k8s-cache-amd64
          - image: us-docker.pkg.dev/grafanalabs-global/dockerhub-beyla-prod-mirror/beyla-k8s-cache
            file: k8scache.Dockerfile
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            artifact_suffix: k8s-cache-arm64
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: "false"
          submodules: "recursive"

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Log into GAR
        uses: grafana/shared-workflows/actions/login-to-gar@c7ad5f57693ac858c698d95783685a9cbfd91223 # login-to-gar/v1.0.1
        with:
          registry: us-docker.pkg.dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./${{ matrix.file }}
          platforms: ${{ matrix.platform }}
          outputs: type=image,"name=${{ matrix.image }}",push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          touch "${{ runner.temp }}/digests/${DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.artifact_suffix }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  create-manifest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # required for GAR OIDC authentication
      id-token: write
    strategy:
      matrix:
        include:
          - image: us-docker.pkg.dev/grafanalabs-global/dockerhub-beyla-prod-mirror/beyla
            artifact_prefix: beyla
          - image: us-docker.pkg.dev/grafanalabs-global/dockerhub-beyla-prod-mirror/beyla-k8s-cache
            artifact_prefix: k8s-cache
    steps:
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Log into GAR
        uses: grafana/shared-workflows/actions/login-to-gar@c7ad5f57693ac858c698d95783685a9cbfd91223 # login-to-gar/v1.0.1
        with:
          registry: us-docker.pkg.dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ matrix.image }}
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}}

      - name: Download amd64 digest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: digests-${{ matrix.artifact_prefix }}-amd64
          path: ${{ runner.temp }}/digests/amd64

      - name: Download arm64 digest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: digests-${{ matrix.artifact_prefix }}-arm64
          path: ${{ runner.temp }}/digests/arm64

      - name: Create manifest list and push
        env:
          IMAGE: ${{ matrix.image }}
          META_JSON: ${{ steps.meta.outputs.json }}
          DIGESTS_DIR: ${{ runner.temp }}/digests
        run: |
          AMD64_DIGEST=$(basename "${DIGESTS_DIR}"/amd64/*)
          ARM64_DIGEST=$(basename "${DIGESTS_DIR}"/arm64/*)
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "${META_JSON}") \
            "${IMAGE}@sha256:${AMD64_DIGEST}" \
            "${IMAGE}@sha256:${ARM64_DIGEST}"
