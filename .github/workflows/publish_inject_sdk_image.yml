name: Publish inject-sdk-image

on:
  push:
    branches:
      - main
    paths:
      - 'pkg/webhook/image/**'

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-inject-sdk-image
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/grafana/beyla/inject-sdk-image
  PACKAGE_NAME: beyla%2Finject-sdk-image

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Resolve target version
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          TODAY=$(date -u +%Y.%m.%d)

          if versions=$(
            gh api \
              --paginate \
              --slurp \
              -H "Accept: application/vnd.github+json" \
              "/orgs/grafana/packages/container/${PACKAGE_NAME}/versions"
          ); then
            :
          else
            versions='[]'
          fi

          # Find the highest counter published today (e.g. for 2026.06.03.2, that's 2).
          # Defaults to -1 if none exist so the first version of the day is .0.
          existing_counter=$(
            jq -r --arg today "${TODAY}" '
              [
                .[]?[]
                | .metadata.container.tags[]?
                | select(startswith($today + "."))
                | ltrimstr($today + ".")
                | select(test("^[0-9]+$"))
                | tonumber
              ] | max // -1
            ' <<< "${versions}"
          )

          VERSION="${TODAY}.$((existing_counter + 1))"

          echo "Today: ${TODAY}"
          echo "Existing counter for today: ${existing_counter}"
          echo "Publishing version: ${VERSION}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

  build:
    needs: resolve-version
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            artifact_suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            artifact_suffix: arm64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GHCR
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ./pkg/webhook/image
          file: ./pkg/webhook/image/Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,"name=${{ env.IMAGE_NAME }}",push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          touch "${{ runner.temp }}/digests/${DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: digests-inject-sdk-image-${{ matrix.artifact_suffix }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  create-manifest:
    needs:
      - resolve-version
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Download amd64 digest
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: digests-inject-sdk-image-amd64
          path: ${{ runner.temp }}/digests/amd64

      - name: Download arm64 digest
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: digests-inject-sdk-image-arm64
          path: ${{ runner.temp }}/digests/arm64

      - name: Create manifest list and push
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
          DIGESTS_DIR: ${{ runner.temp }}/digests
        run: |
          AMD64_DIGEST=$(basename "${DIGESTS_DIR}"/amd64/*)
          ARM64_DIGEST=$(basename "${DIGESTS_DIR}"/arm64/*)
          docker buildx imagetools create \
            -t "${IMAGE_NAME}:${VERSION}" \
            "${IMAGE_NAME}@sha256:${AMD64_DIGEST}" \
            "${IMAGE_NAME}@sha256:${ARM64_DIGEST}"

      - name: Summarize published tag
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
        run: |
          {
            echo "## inject-sdk-image published"
            echo
            echo "- Image: \`${IMAGE_NAME}\`"
            echo "- Version: \`${VERSION}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
