name: Publish inject-sdk-image (manual)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semver to publish (for example 0.1.3). Leave empty to publish the next patch version."
        required: false
        type: string

permissions:
  contents: read
  packages: read

concurrency:
  group: publish-inject-sdk-image-${{ github.event.inputs.version || 'auto' }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/grafana/beyla/inject-sdk-image
  PACKAGE_NAME: beyla%2Finject-sdk-image

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Resolve target version
        id: resolve
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if versions=$(
            gh api \
              --paginate \
              --slurp \
              -H "Accept: application/vnd.github+json" \
              "/orgs/grafana/packages/container/${PACKAGE_NAME}/versions"
          ); then
            :
          else
            versions='[]'
          fi

          existing_tags=$(
            jq -r '
              [
                .[]?[]
                | .metadata.container.tags[]?
                | select(test("^[0-9]+\\.[0-9]+\\.[0-9]+$"))
              ] | unique[]
            ' <<< "${versions}"
          )

          if [[ -n "${INPUT_VERSION}" ]]; then
            if [[ ! "${INPUT_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Invalid version '${INPUT_VERSION}'. Expected format X.Y.Z"
              exit 1
            fi

            if grep -Fxq "${INPUT_VERSION}" <<< "${existing_tags}"; then
              echo "::error::Version '${INPUT_VERSION}' already exists in GHCR"
              exit 1
            fi

            VERSION="${INPUT_VERSION}"
            echo "Using version from workflow input: ${VERSION}"
            echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          latest=$(
            jq -r '
              [
                .[]?[]
                | .metadata.container.tags[]?
                | select(test("^[0-9]+\\.[0-9]+\\.[0-9]+$"))
              ]
              | unique
              | sort_by(split(".") | map(tonumber))
              | last // empty
            ' <<< "${versions}"
          )

          if [[ -z "${latest}" ]]; then
            VERSION="0.0.1"
            echo "No existing semver tags found in GHCR. Defaulting to ${VERSION}"
            echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          IFS='.' read -r major minor patch <<< "${latest}"
          VERSION="${major}.${minor}.$((patch + 1))"

          echo "Latest published version: ${latest}"
          echo "Next patch version: ${VERSION}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

  build-and-publish:
    needs: resolve-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@e20f71606f9786f3a5a35f44b5f3e647d0abf6e3 # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GHCR
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1 # v3.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ./pkg/webhook/image
          file: ./pkg/webhook/image/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ needs.resolve-version.outputs.version }}

      - name: Summarize published tag
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
        run: |
          {
            echo "## inject-sdk-image published"
            echo
            echo "- Image: \`${IMAGE_NAME}\`"
            echo "- Version: \`${VERSION}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
