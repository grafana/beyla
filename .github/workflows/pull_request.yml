name: Pull request checks

on:
  push:
    branches: ["main", "release-*"]
  pull_request:
    branches: ["main", "release-*"]

concurrency:
  group: pull-request-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

# Set restrictive permissions at workflow level
permissions:
  contents: read

jobs:
  generate:
    name: Generate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: true

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: "go.mod"
          cache: true # zizmor: ignore[cache-poisoning] go.sum verifies module integrity

      - name: Go build cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0 # zizmor: ignore[cache-poisoning] go build cache is content-addressable and self-verifying
        with:
          path: ~/.cache/go-build
          key: go-build-pr-race-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/*.go', 'go.sum') }}
          restore-keys: |
            go-build-pr-race-${{ runner.os }}-${{ runner.arch }}-

      - name: Generate and vendor OBI
        run: make vendor-obi

      - name: Check config schema is up to date
        run: make check-config-schema

      - name: Build unit test matrix
        id: build-matrix
        env:
          PARTITIONS: 3
        run: |
          make prereqs
          echo -n "matrix=" >> $GITHUB_OUTPUT
          make unit-test-matrix-json >> $GITHUB_OUTPUT

      - name: Upload generated BPF files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          # prevent cache poisoning by using the SHA of the commit
          name: bpf-generated-${{ github.sha }}
          path: |
            **/*_bpfel.go
            **/*_bpfel.o
          retention-days: 1

  lint:
    name: Lint
    needs: generate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: true

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: "go.mod"
          cache: true # zizmor: ignore[cache-poisoning] go.sum verifies module integrity

      - name: Go build cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0 # zizmor: ignore[cache-poisoning] go build cache is content-addressable and self-verifying
        with:
          path: ~/.cache/go-build
          key: go-build-pr-race-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/*.go', 'go.sum') }}
          restore-keys: |
            go-build-pr-race-${{ runner.os }}-${{ runner.arch }}-

      - name: Download generated BPF files
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bpf-generated-${{ github.sha }}

      - name: Lint
        run: make lint lint-dashboard

  unit-test:
    name: "Unit test ${{ matrix.description }}"
    needs: generate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Grant specific permissions needed only for this job
    permissions:
      contents: read
      pull-requests: write
      # required for CODECOV token
      id-token: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate.outputs.matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: true

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: "go.mod"
          cache: true # zizmor: ignore[cache-poisoning] go.sum verifies module integrity

      - name: Go build cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0 # zizmor: ignore[cache-poisoning] go build cache is content-addressable and self-verifying
        with:
          path: ~/.cache/go-build
          key: go-build-pr-race-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/*.go', 'go.sum') }}
          restore-keys: |
            go-build-pr-race-${{ runner.os }}-${{ runner.arch }}-

      - name: Download generated BPF files
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bpf-generated-${{ github.sha }}

      - name: Run unit tests
        env:
          MATRIX_ID: ${{ matrix.id }}
          MATRIX_PACKAGES: ${{ matrix.packages }}
        run: make prereqs run-unit-test-shard SHARD_ID="${MATRIX_ID}" UNIT_TEST_PACKAGES="${MATRIX_PACKAGES}"

      - name: Exclude generated files from coverage
        env:
          MATRIX_ID: ${{ matrix.id }}
        run: make cov-exclude-generated-shard SHARD_ID="${MATRIX_ID}"

      - id: get-codecov-token
        uses: grafana/shared-workflows/actions/get-vault-secrets@9f37f656e063f0ad0b0bfc38d49894b57d363936 # get-vault-secrets/v1.2.1
        continue-on-error: true
        with:
          # Secrets placed in the ci/repo/grafana/beyla/codecov path in Vault
          repo_secrets: |
            CODECOV_TOKEN=codecov:token

      - name: Report coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        continue-on-error: true
        with:
          files: ./testoutput/cover-shard-${{ matrix.id }}.txt
          flags: unittests
          name: go-unittests-coverage-shard-${{ matrix.id }}-${{ github.run_number }}
