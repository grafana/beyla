name: Pull request K8s integration tests

on:
  push:
    branches: ["main", "release-*"]
  pull_request:
    branches: ["main", "release-*"]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "bpf/**"
      - "internal/**"
      - "pkg/**"
      - "cmd/**"
      - "vendor/**"
      - "Makefile"
      - "scripts/generate-integration-matrix.sh"
      - "scripts/generate-obi-tests.sh"
      - ".github/workflows/pull_request_k8s_integration_tests.yml"
      - ".obi-src"
      - ".obi-src/**"

concurrency:
  group: k8s-integration-tests-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

# Set restrictive permissions at workflow level
permissions:
  contents: read

jobs:
  test-matrix:
    name: "Build integration k8s matrix"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: true

      - name: Generate OBI tests
        run: make generate-obi-tests

      - name: build matrix
        id: build-matrix
        run: |
          echo -n "matrix=" >> $GITHUB_OUTPUT
          make k8s-integration-test-matrix-json >> $GITHUB_OUTPUT

  test:
    name: ${{ matrix.basename }}
    needs: test-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Grant specific permissions needed only for this job
    permissions:
      contents: read
      pull-requests: write
      # required for CODECOV token
      id-token: write
      checks: write
      # Required for uploading artifacts
      actions: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.test-matrix.outputs.matrix) }}
    steps:
      - name: Free up disk space
        run: |
          # Remove Java (JDKs)
          sudo rm -rf /usr/lib/jvm

          # Remove .NET SDKs
          sudo rm -rf /usr/share/dotnet

          # Remove Swift toolchain
          sudo rm -rf /usr/share/swift

          # Remove Haskell (GHC)
          sudo rm -rf /usr/local/.ghcup

          # Remove Julia
          sudo rm -rf /usr/local/julia*

          # Remove Android SDKs
          sudo rm -rf /usr/local/lib/android

          # Remove Chromium (optional if not using for browser tests)
          sudo rm -rf /usr/local/share/chromium

          # Remove Microsoft/Edge and Google Chrome builds
          sudo rm -rf /opt/microsoft /opt/google

          # Remove Azure CLI
          sudo rm -rf /opt/az

          # Remove PowerShell
          sudo rm -rf /usr/local/share/powershell

          # Remove CodeQL (but keep hostedtoolcache for Go)
          sudo rm -rf /opt/hostedtoolcache/CodeQL

          docker system prune -af || true
          docker builder prune -af || true
          df -h

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: true

      - name: Login to DockerHub
        if: github.repository == 'grafana/beyla' && (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork)
        uses: grafana/shared-workflows/actions/dockerhub-login@fa12a1486d937f2a2fba2f0a615356ee3053695e

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: "go.mod"
          cache: true # zizmor: ignore[cache-poisoning] go.sum verifies module integrity

      - name: Go build cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3 # zizmor: ignore[cache-poisoning] go build cache is content-addressable and self-verifying
        with:
          path: ~/.cache/go-build
          key: go-build-k8s-integration-race-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/*.go', 'go.sum') }}
          restore-keys: |
            go-build-k8s-integration-race-${{ runner.os }}-${{ runner.arch }}-

      - name: Generate files
        run: make prereqs vendor-obi

      - name: Check disk usage before tests
        run: df -h

      - name: Run integration tests
        env:
          # zizmor template-injection fixes: pass data as env vars
          MATRIX_ID: ${{ matrix.id }}
          MATRIX_JSON: ${{ toJson(matrix) }}
          MATRIX_TEST_PATTERN: ${{ matrix.test_pattern }}
          RUN_NUMBER: ${{ github.run_number }}
          TEST_TAGS: integration
        run: |
          echo Partition
          echo "${MATRIX_JSON}"

          if [ -z "${MATRIX_TEST_PATTERN}" ]; then
            echo "Error: Test pattern is empty for shard $MATRIX_ID"
            exit 1
          fi

          mkdir -p /home/runner/reports

          ./bin/gotestsum \
              --rerun-fails=2 --rerun-fails-max-failures=2 --rerun-fails-abort-on-data-race \
              --packages="${MATRIX_TEST_PATTERN}" -ftestname \
              --jsonfile=/home/runner/reports/test-run-"${RUN_NUMBER}"-"${MATRIX_ID}".log \
              -- -race -count=1 -tags=${TEST_TAGS} -timeout 30m \
              -mod vendor \
              ${MATRIX_TEST_PATTERN}

      - name: Process coverage data
        run: make itest-coverage-data

      - id: get-codecov-token
        uses: grafana/shared-workflows/actions/get-vault-secrets@9f37f656e063f0ad0b0bfc38d49894b57d363936 # get-vault-secrets/v1.2.1
        continue-on-error: true
        with:
          # Secrets placed in the ci/repo/grafana/beyla/codecov path in Vault
          repo_secrets: |
            CODECOV_TOKEN=codecov:token

      - name: Report coverage
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          files: ./testoutput/itest-covdata.txt
          flags: k8s-integration-test
          name: go-k8s-integration-test-coverage-${{ matrix.basename }}-${{ github.run_number }}

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: go-k8s-integration-test-reports-${{ matrix.basename }}-${{ github.run_number }}
          path: /home/runner/reports/*.log
          retention-days: 5

      - name: Upload test logs
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: go-k8s-integration-test-logs-${{ matrix.basename }}-${{ github.run_number }}
          path: |
            testoutput/*.log
            testoutput/kind

      - name: Check final disk usage
        if: always()
        run: df -h
