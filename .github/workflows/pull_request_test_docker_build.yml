name: Test Docker build
on:
  pull_request:
    branches: ["main", "release-*"]

concurrency:
  group: docker-build-test-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      # required for DockerHub access
      id-token: write

    strategy:
      matrix:
        include:
          - file: Dockerfile
            platform: linux/amd64
            runner: ubuntu-latest
          - file: Dockerfile
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - file: k8scache.Dockerfile
            platform: linux/amd64
            runner: ubuntu-latest
          - file: k8scache.Dockerfile
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: recursive

      - name: Login to DockerHub
        if: github.repository == 'grafana/beyla' && (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork)
        uses: grafana/shared-workflows/actions/dockerhub-login@e5b7989c92b55fe3ac6dd006d6de49082ba8c507

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./${{ matrix.file }}
          push: false
          platforms: ${{ matrix.platform }}
