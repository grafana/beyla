name: Test Docker build
on:
  pull_request:
    branches: ["main", "release-*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest-8-cores

    strategy:
      matrix:
        platform: [linux/amd64] # linux/arm64 is too slow on GitHub Actions.
        file: [Dockerfile, k8scache.Dockerfile]

    steps:
      - id: checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: "false"
          submodules: "recursive"
      - id: docker-build-beyla
        uses: grafana/shared-workflows/actions/build-push-to-dockerhub@7f983a8135eb58eaec83c96d8b842b2092e110e3 # main
        with:
          context: .
          file: ${{ matrix.file }}
          platforms: |-
            ${{ matrix.platform }}
          tags: |-
            "pr-test"
          push: false
