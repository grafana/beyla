name: Test Docker build
on:
  pull_request:
    branches: ["main", "release-*"]

concurrency:
  group: docker-build-test-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      # required for DockerHub access
      id-token: write

    strategy:
      matrix:
        include:
          - file: Dockerfile
            platform: linux/amd64
            runner: ubuntu-latest
          - file: Dockerfile
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - file: k8scache.Dockerfile
            platform: linux/amd64
            runner: ubuntu-latest
          - file: k8scache.Dockerfile
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive

      - name: Login to DockerHub
        if: github.repository == 'grafana/beyla' && (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork)
        uses: grafana/shared-workflows/actions/dockerhub-login@f2909d40e17c95ca36e7b643fa56ca53ca6571f9

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./${{ matrix.file }}
          push: false
          platforms: ${{ matrix.platform }}
