name: Release binaries
on:
  workflow_call:
    inputs:
      arch:
        description: "Target architecture to build the binaries"
        required: true
        type: string
      runner:
        description: "The github runner to run on"
        required: true
        type: string
permissions:
  contents: read
jobs:
  release-binaries:
    name: Release compiled binaries for Linux/${{inputs.arch}}
    runs-on: ${{inputs.runner}}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          cache: false # Disable caching to avoid extraction conflicts
          go-version-file: "go.mod"
      - name: Build Go release for linux/${{inputs.arch}}
        run: make artifact
        env:
          GOOS: linux
          GOARCH: ${{ inputs.arch }}
      - name: Upload release asset
        uses: actions/upload-release-asset@e8f9f06c4b078e705bd2ea027f0926603fc9b4d5 # v1.0.2
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./bin/beyla.tar.gz
          asset_name: beyla-linux-${{ inputs.arch }}-${{ github.event.release.tag_name }}.tar.gz
          asset_content_type: application/gzip
