name: "CI Supervisor: Rerun flaky failures"

on: # zizmor: ignore[dangerous-triggers] no code checkout; GITHUB_TOKEN used for all ops except label addition
  workflow_run:
    workflows:
      - "Pull request checks"
      - "Pull request integration tests"
      - "Pull request Beyla integration tests"
      - "Pull request K8s integration tests"
      - "Pull request integration tests ARM"
      - "PR OATS test"
      - "Check third-party licenses"
      - "Test Docker build"
      - "Documentation CI"
      - "Pull request integration tests on VM"
      - "Helm Test"
    types: [completed]

# Set restrictive permissions at workflow level
permissions: {}

concurrency:
  group: "supervisor-${{ github.event.workflow_run.id }}"
  cancel-in-progress: false

jobs:
  evaluate-and-rerun:
    name: Evaluate failed checks
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_repository.id == github.event.workflow_run.repository.id
    runs-on: ubuntu-latest
    permissions:
      actions: write
      pull-requests: write
    timeout-minutes: 5
    outputs:
      should-label: ${{ steps.evaluate.outputs.should_label }}
      pr-number: ${{ steps.evaluate.outputs.pr_number }}
      label-count: ${{ steps.evaluate.outputs.label_count }}
      max-label-runs: ${{ steps.evaluate.outputs.max_label_runs }}
    steps:
      - name: Evaluate and rerun flaky failures
        id: evaluate
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          MAX_ATTEMPTS=2
          MARKER="<!-- ci-supervisor -->"

          # --- Resolve the associated PR ---
          PR_NUMBER=$(gh api "repos/${REPO}/actions/runs/${RUN_ID}" --jq '.pull_requests[0].number // empty' 2>/dev/null || true)
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR associated with run ${RUN_ID}. Exiting."
            exit 0
          fi
          # Validate PR number is a positive integer
          if ! echo "$PR_NUMBER" | grep -qE '^[0-9]+$'; then
            echo "Invalid PR number: ${PR_NUMBER}. Exiting."
            exit 1
          fi
          echo "PR #${PR_NUMBER} -- workflow: ${WORKFLOW_NAME}"
          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"

          # --- Get run details ---
          RUN_JSON=$(gh run view "$RUN_ID" --repo "$REPO" --json attempt,jobs,name)
          ATTEMPT=$(echo "$RUN_JSON" | jq -r '.attempt')
          echo "Current attempt: ${ATTEMPT}"

          # --- Check attempt limit first ---
          VERDICT="rerun"
          REASON=""
          if [ "$ATTEMPT" -ge "$MAX_ATTEMPTS" ]; then
            VERDICT="skip"
            REASON="Maximum re-run attempts reached (attempt ${ATTEMPT} of ${MAX_ATTEMPTS})"
          fi

          # --- Build new table rows for this workflow's failed jobs ---
          NEW_ROWS=""

          while IFS=$'\t' read -r job_name job_conclusion; do
            # Unrecoverable: lint failure in "Pull request checks" -- re-run won't help
            if [ "$WORKFLOW_NAME" = "Pull request checks" ] && echo "$job_name" | grep -qi "lint"; then
              if [ "$VERDICT" != "skip" ]; then
                VERDICT="skip"
                REASON="Lint job failed in '${WORKFLOW_NAME}' -- compile-level problem, re-run will not help"
              fi
            fi

            if [ "$VERDICT" = "rerun" ]; then
              rerunning="Yes"
            else
              rerunning="No"
            fi

            NEW_ROWS="${NEW_ROWS}| ${WORKFLOW_NAME} | ${job_name} | ${job_conclusion} | ${rerunning} | ${ATTEMPT}/${MAX_ATTEMPTS} |
          "
          done < <(echo "$RUN_JSON" | jq -r '.jobs[] | select(.conclusion == "failure" or .conclusion == "timed_out") | [.name, .conclusion] | @tsv')

          if [ -z "$NEW_ROWS" ]; then
            echo "No failed or timed-out jobs found. Exiting."
            exit 0
          fi

          # --- Take action ---
          SHOULD_LABEL="false"
          if [ "$VERDICT" = "rerun" ]; then
            echo "Re-running failed jobs for run ${RUN_ID}..."
            gh run rerun "$RUN_ID" --repo "$REPO" --failed
          else
            echo "Skipping re-run: ${REASON}"

            # Check if we should add agent/fix-obi label for automated PRs
            MAX_AGENT_RUNS=5
            HAS_AUTOMATED=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json labels --jq '[.labels[].name] | any(. == "automated-pr")')
            HAS_AGENT=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json labels --jq '[.labels[].name] | any(. == "agent/fix-obi" or . == "agent/fix-obi-pending")')
            AGENT_LABEL_COUNT=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json comments --jq '[.comments[] | select(.author.login == "grafana-beyla-bot" or .author.login == "github-actions[bot]") | .body | select(contains("Added `agent/fix-obi-pending` label") or contains("Added `agent/fix-obi` label"))] | length')
            echo "agent/fix-obi has been added ${AGENT_LABEL_COUNT}/${MAX_AGENT_RUNS} times"
            echo "label_count=${AGENT_LABEL_COUNT}" >> "$GITHUB_OUTPUT"
            echo "max_label_runs=${MAX_AGENT_RUNS}" >> "$GITHUB_OUTPUT"

            if [ "$HAS_AUTOMATED" = "true" ] && [ "$HAS_AGENT" = "false" ]; then
              if [ "$AGENT_LABEL_COUNT" -ge "$MAX_AGENT_RUNS" ]; then
                echo "Maximum agent/fix-obi attempts (${MAX_AGENT_RUNS}) reached -- not relabelling"
              else
                SHOULD_LABEL="true"
              fi
            fi
          fi

          echo "should_label=${SHOULD_LABEL}" >> "$GITHUB_OUTPUT"

          # --- Fetch existing sticky comment (if any) and merge rows ---
          EXISTING_COMMENT=$(gh api --paginate "repos/${REPO}/issues/${PR_NUMBER}/comments?per_page=100" 2>/dev/null \
            | jq -s --arg marker "$MARKER" '[.[][] | select(.body | startswith($marker))] | last | {id, body}' \
            || echo '{}')
          EXISTING_COMMENT_ID=$(echo "$EXISTING_COMMENT" | jq -r '.id // empty')
          EXISTING_BODY=$(echo "$EXISTING_COMMENT" | jq -r '.body // empty')

          # Extract existing table rows, dropping rows that belong to the current workflow
          # (they'll be replaced by NEW_ROWS).
          KEPT_ROWS=""
          if [ -n "$EXISTING_BODY" ]; then
            KEPT_ROWS=$(echo "$EXISTING_BODY" | grep '^|' | grep -v '^| Workflow' | grep -v '^|---' | grep -v "^| ${WORKFLOW_NAME} |" || true)
            if [ -n "$KEPT_ROWS" ]; then
              KEPT_ROWS="${KEPT_ROWS}
          "
            fi
          fi

          # --- Build the full comment ---
          COMMENT_BODY="${MARKER}
          ### CI Supervisor

          | Workflow | Job | Last state | Re-running? | Attempt |
          |----------|-----|-----------|-------------|---------|
          ${KEPT_ROWS}${NEW_ROWS}"

          if [ -n "$EXISTING_COMMENT_ID" ]; then
            gh api "repos/${REPO}/issues/comments/${EXISTING_COMMENT_ID}" \
              --method PATCH --field body="$COMMENT_BODY" > /dev/null
            echo "Updated CI Supervisor comment (id: ${EXISTING_COMMENT_ID}) on PR #${PR_NUMBER}"
          else
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$COMMENT_BODY"
            echo "Posted CI Supervisor comment on PR #${PR_NUMBER}"
          fi

  add-agent-label:
    name: Add agent/fix-obi-pending label
    needs: evaluate-and-rerun
    if: needs.evaluate-and-rerun.outputs.should-label == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      checks: read
      pull-requests: write
      id-token: write
    timeout-minutes: 5
    steps:
      - name: Get GitHub App token
        id: get-github-app-token
        uses: grafana/shared-workflows/actions/create-github-app-token@ae92934a14a48b94494dbc06d74a81d47fe08a40 # create-github-app-token/v0.2.2
        with:
          github_app: grafana-beyla-bot

      - name: Add pending label and promote if CI is already complete
        env:
          GH_TOKEN: ${{ steps.get-github-app-token.outputs.token }}
          PR_NUMBER: ${{ needs.evaluate-and-rerun.outputs.pr-number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          echo "Adding agent/fix-obi-pending label to PR #${PR_NUMBER}"
          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "agent/fix-obi-pending"

          # Check if all CI checks are already complete — if so, promote immediately.
          # This handles the edge case where the failing workflow was the last to complete.
          EXCLUDED_NAMES='["Fix OBI submodule CI","CI Supervisor: Rerun flaky failures","Wait for CI completion","Triage CI failures","Plan fixes","Implement and push","Remove agent label","Evaluate failed checks","Add agent/fix-obi-pending label","Handle CI completion","Request Copilot review"]'

          HEAD_SHA=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json headRefOid --jq '.headRefOid')

          PR_SUITE_IDS=$(
            gh api --paginate -H "Accept: application/vnd.github+json" \
              "repos/${REPO}/actions/runs?head_sha=${HEAD_SHA}&event=pull_request&per_page=100" \
              | jq -s '[ map(.workflow_runs // []) | add // [] | .[].check_suite_id ]'
          )

          ALL_CHECKS=$(
            gh api --paginate -H "Accept: application/vnd.github+json" \
              "repos/${REPO}/commits/${HEAD_SHA}/check-runs?per_page=100" \
              | jq -s '{check_runs: ((map(.check_runs // []) | add) // [])}'
          )

          CHECKS_JSON=$(
            echo "$ALL_CHECKS" \
              | jq --argjson pr_suites "$PR_SUITE_IDS" --argjson excluded "$EXCLUDED_NAMES" \
                '{check_runs: [
                  .check_runs[]
                  | select(
                      .app.slug != "github-actions"
                      or (.check_suite.id as $id | $pr_suites | index($id))
                    )
                  | select(
                      (.name as $n | $excluded | index($n)) | not
                    )
                ]}' \
              | jq '{check_runs: [.check_runs | group_by(.name) | .[] | sort_by(.id) | last]}'
          )

          TOTAL=$(echo "$CHECKS_JSON" | jq '.check_runs | length')
          PENDING=$(echo "$CHECKS_JSON" | jq '[.check_runs[] | select(.status != "completed")] | length')

          if [ "$TOTAL" -gt 0 ] && [ "$PENDING" -eq 0 ]; then
            echo "All ${TOTAL} CI checks already complete — promoting to agent/fix-obi immediately"
            gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label "agent/fix-obi-pending"
            gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "agent/fix-obi"

            # This PR is always automated-pr (evaluate-and-rerun only sets should-label for automated PRs).
            # If checks are also all green, request Copilot review since handle-ci-completion won't re-fire.
            NON_GREEN=$(echo "$CHECKS_JSON" | jq '[.check_runs[] | select(.conclusion != "success" and .conclusion != "neutral" and .conclusion != "skipped")] | length')
            if [ "$NON_GREEN" -eq 0 ]; then
              echo "All checks green — requesting Copilot review"
              gh pr edit "$PR_NUMBER" --repo "$REPO" --add-reviewer "copilot"
            fi
          else
            echo "${PENDING} of ${TOTAL} checks still pending — handle-ci-completion job will promote when CI completes"
          fi

  handle-ci-completion:
    name: Handle CI completion
    if: >
      github.event.workflow_run.head_repository.id == github.event.workflow_run.repository.id
    runs-on: ubuntu-latest
    permissions:
      actions: read
      checks: read
      pull-requests: write
      id-token: write
    timeout-minutes: 5
    steps:
      - name: Resolve PR and check CI status
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # --- Resolve the associated PR ---
          PR_NUMBER=$(gh api "repos/${REPO}/actions/runs/${RUN_ID}" --jq '.pull_requests[0].number // empty' 2>/dev/null || true)
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR associated with run ${RUN_ID}. Exiting."
            exit 0
          fi
          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"

          # --- Check which labels are present ---
          LABELS=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json labels --jq '[.labels[].name]')
          HAS_PENDING=$(echo "$LABELS" | jq 'any(. == "agent/fix-obi-pending")')
          HAS_AUTOMATED=$(echo "$LABELS" | jq 'any(. == "automated-pr")')

          if [ "$HAS_PENDING" != "true" ] && [ "$HAS_AUTOMATED" != "true" ]; then
            echo "PR #${PR_NUMBER} has neither agent/fix-obi-pending nor automated-pr. Exiting."
            exit 0
          fi

          # --- Fetch CI check status (single copy of shared logic) ---
          EXCLUDED_NAMES='["Fix OBI submodule CI","CI Supervisor: Rerun flaky failures","Wait for CI completion","Triage CI failures","Plan fixes","Implement and push","Remove agent label","Evaluate failed checks","Add agent/fix-obi-pending label","Handle CI completion","Request Copilot review"]'

          HEAD_SHA=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json headRefOid --jq '.headRefOid')

          PR_SUITE_IDS=$(
            gh api --paginate -H "Accept: application/vnd.github+json" \
              "repos/${REPO}/actions/runs?head_sha=${HEAD_SHA}&event=pull_request&per_page=100" \
              | jq -s '[ map(.workflow_runs // []) | add // [] | .[].check_suite_id ]'
          )

          ALL_CHECKS=$(
            gh api --paginate -H "Accept: application/vnd.github+json" \
              "repos/${REPO}/commits/${HEAD_SHA}/check-runs?per_page=100" \
              | jq -s '{check_runs: ((map(.check_runs // []) | add) // [])}'
          )

          CHECKS_JSON=$(
            echo "$ALL_CHECKS" \
              | jq --argjson pr_suites "$PR_SUITE_IDS" --argjson excluded "$EXCLUDED_NAMES" \
                '{check_runs: [
                  .check_runs[]
                  | select(
                      .app.slug != "github-actions"
                      or (.check_suite.id as $id | $pr_suites | index($id))
                    )
                  | select(
                      (.name as $n | $excluded | index($n)) | not
                    )
                ]}' \
              | jq '{check_runs: [.check_runs | group_by(.name) | .[] | sort_by(.id) | last]}'
          )

          TOTAL=$(echo "$CHECKS_JSON" | jq '.check_runs | length')
          PENDING=$(echo "$CHECKS_JSON" | jq '[.check_runs[] | select(.status != "completed")] | length')

          if [ "$TOTAL" -eq 0 ]; then
            echo "No CI checks found yet. Exiting."
            exit 0
          fi

          if [ "$PENDING" -gt 0 ]; then
            echo "${PENDING} of ${TOTAL} checks still pending. Will re-evaluate on next workflow completion."
            exit 0
          fi

          echo "All ${TOTAL} CI checks complete."

          # --- Determine actions ---
          if [ "$HAS_PENDING" = "true" ]; then
            echo "should_promote=true" >> "$GITHUB_OUTPUT"
          fi

          NON_GREEN=$(echo "$CHECKS_JSON" | jq '[.check_runs[] | select(.conclusion != "success" and .conclusion != "neutral" and .conclusion != "skipped")] | length')
          if [ "$HAS_AUTOMATED" = "true" ] && [ "$NON_GREEN" -eq 0 ]; then
            echo "should_request_review=true" >> "$GITHUB_OUTPUT"
          elif [ "$NON_GREEN" -gt 0 ]; then
            echo "${NON_GREEN} check(s) are not green:"
            echo "$CHECKS_JSON" | jq -r '.check_runs[] | select(.conclusion != "success" and .conclusion != "neutral" and .conclusion != "skipped") | "  - \(.name): \(.conclusion // "none")"'
          fi

      - name: Get GitHub App token
        if: steps.check.outputs.should_promote == 'true'
        id: get-github-app-token
        uses: grafana/shared-workflows/actions/create-github-app-token@ae92934a14a48b94494dbc06d74a81d47fe08a40 # create-github-app-token/v0.2.2
        with:
          github_app: grafana-beyla-bot

      - name: Promote pending label to agent/fix-obi
        if: steps.check.outputs.should_promote == 'true'
        env:
          GH_TOKEN: ${{ steps.get-github-app-token.outputs.token }}
          PR_NUMBER: ${{ steps.check.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          echo "Swapping agent/fix-obi-pending → agent/fix-obi on PR #${PR_NUMBER}"
          gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label "agent/fix-obi-pending"
          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "agent/fix-obi"

      - name: Request Copilot review
        if: steps.check.outputs.should_request_review == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.check.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          echo "All CI checks green on automated PR #${PR_NUMBER}. Requesting Copilot review."
          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-reviewer "copilot"
