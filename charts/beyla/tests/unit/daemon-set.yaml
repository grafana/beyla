suite: test daemon-set template
templates:
  - configmap.yaml
  - daemon-set.yaml
tests:
  - it: should set minReadySeconds when provided
    template: daemon-set.yaml
    set:
      minReadySeconds: 42
    asserts:
      - isKind:
          of: DaemonSet
      - equal:
          path: spec.minReadySeconds
          value: 42

  - it: should set minReadySeconds to 0 when explicitly set
    template: daemon-set.yaml
    set:
      minReadySeconds: 0
    asserts:
      - isKind:
          of: DaemonSet
      - equal:
          path: spec.minReadySeconds
          value: 0

  - it: should not set minReadySeconds when not provided
    template: daemon-set.yaml
    set:
      minReadySeconds: null
    asserts:
      - isKind:
          of: DaemonSet
      - notExists:
          path: spec.minReadySeconds

  - it: should use checksum override when provided
    template: daemon-set.yaml
    set:
      config:
        checksum: "custom-sum"
    asserts:
      - isKind:
          of: DaemonSet
      - equal:
          path: spec.template.metadata.annotations.checksum/config
          value: custom-sum

  - it: should default checksum to configmap hash when override empty
    template: daemon-set.yaml
    set:
      config:
        checksum: ""
    asserts:
      - isKind:
          of: DaemonSet
      - matchRegex:
          path: spec.template.metadata.annotations.checksum/config
          pattern: "^[a-f0-9]{64}$"

  - it: should use image.tag for version label when set
    template: daemon-set.yaml
    set:
      image:
        tag: "custom"
    asserts:
      - isKind:
          of: DaemonSet
      - equal:
          path: metadata.labels["app.kubernetes.io/version"]
          value: "custom"

  - it: should mount default host machine-id files as read-only
    template: daemon-set.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            mountPath: /etc/machine-id
            name: machine-id-file-0
            readOnly: true
      - contains:
          path: spec.template.spec.volumes
          content:
            name: machine-id-file-0
            hostPath:
              path: /etc/machine-id
              type: File

  - it: should allow disabling machine-id host file mounts
    template: daemon-set.yaml
    set:
      machineIDFiles: []
      contextPropagation:
        enabled: false
    asserts:
      - equal:
          path: spec.template.spec.containers[0].volumeMounts
          value:
            - mountPath: /etc/beyla/config
              name: beyla-config
      - equal:
          path: spec.template.spec.volumes
          value:
            - name: beyla-config
              configMap:
                name: RELEASE-NAME-beyla

  - it: should allow replacing machine-id host file mounts
    template: daemon-set.yaml
    set:
      machineIDFiles:
        - /run/custom-machine-id
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            mountPath: /run/custom-machine-id
            name: machine-id-file-0
            readOnly: true
      - contains:
          path: spec.template.spec.volumes
          content:
            name: machine-id-file-0
            hostPath:
              path: /run/custom-machine-id
              type: File
