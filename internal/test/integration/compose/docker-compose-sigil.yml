services:
  openai:
    build:
      context: ../components/openai/mock-server
      dockerfile: Dockerfile
    image: openai
    ports:
      - "8081:8081"
  testserver:
    build:
      context: ../components/openai
      dockerfile: Dockerfile
    image: testserver
    ports:
      - "8080:8080"
    environment:
      OPENAI_BASE_URL: "http://openai:8081"
    depends_on:
      openai:
        condition: service_started

  beyla:
    build:
      context: ../../../..
      dockerfile: ./internal/test/integration/components/beyla/Dockerfile
    command:
      - --config=/configs/beyla-config-sigil.yml
    volumes:
      - ../configs/:/configs
      - ../system/sys/kernel/security:/sys/kernel/security
      - ../../../../testoutput:/coverage
      - ../../../../testoutput/run-client:/var/run/beyla
      # required for docker metadata decoration
      - /var/run/docker.sock:/var/run/docker.sock
    image: beyla
    privileged: true
    pid: "host"
    environment:
      GOCOVERDIR: "/coverage"
      BEYLA_TRACE_PRINTER: "text"
      BEYLA_DISCOVERY_POLL_INTERVAL: 500ms
      BEYLA_OTLP_TRACES_BATCH_TIMEOUT: "1ms"
      BEYLA_SERVICE_NAMESPACE: "integration-test"
      BEYLA_METRICS_INTERVAL: "10ms"
      BEYLA_BPF_BATCH_TIMEOUT: "10ms"
      BEYLA_LOG_LEVEL: "DEBUG"
      BEYLA_ENFORCE_SYS_CAPS: "false"
      BEYLA_PROCESSES_INTERVAL: "100ms"
      BEYLA_HOSTNAME: "beyla"
      BEYLA_OPEN_PORT: 8080
      BEYLA_GRAFANA_AI_OTEL_EXPORTER_OTLP_ENDPOINT: "http://otelcol:4318"
    ports:
      - "8999:8999" # Prometheus scrape port, if enabled via config

  prometheus:
    image: quay.io/prometheus/prometheus:v3.13.0@sha256:c6b27ea434f8389bfe233fbc7be381cf50587c286e871bc842008f5a1b1908a7
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus-config.yml
      - --web.enable-lifecycle
      - --web.route-prefix=/
    volumes:
      - ./configs/:/etc/prometheus
    ports:
      - "9090:9090"

  jaeger:
    image: jaegertracing/all-in-one:1.60@sha256:4fd2d70fa347d6a47e79fcb06b1c177e6079f92cba88b083153d56263082135e
    ports:
      - "16686:16686" # Query frontend
      - "4317" # OTEL GRPC traces collector
      - "4318" # OTEL HTTP traces collector
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - LOG_LEVEL=debug

  otelcol:
    image: otel/opentelemetry-collector-contrib:0.156.0@sha256:125bdbeb7590cc1952c5b3430ecf14063568980c2c93d5b38676cc0446ed8108
    container_name: otel-col
    deploy:
      resources:
        limits:
          memory: 125M
    restart: unless-stopped
    command: ["--config=/etc/otelcol-config/otelcol-config-jaeger.yml"]
    volumes:
      - ../configs/:/etc/otelcol-config
    ports:
      - "4317" # OTLP over gRPC receiver
      - "4318:4318" # OTLP over HTTP receiver
      - "9464" # Prometheus exporter
      - "8888" # metrics endpoint
    depends_on:
      prometheus:
        condition: service_started
      jaeger:
        condition: service_started
