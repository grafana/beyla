version: "3.8"

services:
  webhook:
    build:
      context: ../../../..
      dockerfile: ./internal/test/integration/components/beyla/Dockerfile
    image: beyla
    command: ["--config=/configs/beyla-config-webhook.yml"]
    volumes:
      - ../configs/:/configs:ro
      - ../testdata/certs:/etc/webhook/certs:ro
    ports:
      - "9443:9443"
      - "2222:2222"
    environment:
      BEYLA_ENFORCE_SYS_CAPS: "false"
      BEYLA_LOG_LEVEL: "DEBUG"

  prometheus:
    image: quay.io/prometheus/prometheus:v2.55.1@sha256:2659f4c2ebb718e7695cb9b25ffa7d6be64db013daba13e05c875451cf51b0d3
    command:
      - --config.file=/etc/prometheus/prometheus-config-webhook.yml
      - --web.enable-lifecycle
      - --web.route-prefix=/
    volumes:
      - ../configs/:/etc/prometheus
    ports:
      - "9090:9090"
    depends_on:
      webhook:
        condition: service_started
