attributes:
  select:
    traces:
      include:
      - gen_ai.input.messages
      - gen_ai.system_instructions
      - gen_ai.output.messages
      - gen_ai.metadata
      - gen_ai.tool.definitions
ebpf:
  buffer_sizes:
    http: 65536
  payload_extraction:
    http:
      genai:
        openai:
          enabled: true
        anthropic:
          enabled: true
        bedrock:
          enabled: true
trace_printer: text
metrics:
  features:
    - application
prometheus_export:
  port: 8999
