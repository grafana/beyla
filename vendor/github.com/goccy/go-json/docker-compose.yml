version: '2'
services:
  go-json:
    image: golang:1.23@sha256:60deed95d3888cc5e4d9ff8a10c54e5edc008c6ae3fba6187be6fb592e19e8c0
    volumes:
      - '.:/go/src/go-json'
    deploy:
      resources:
        limits:
          memory: 620M
    working_dir: /go/src/go-json
    command: |
      sh -c "go test -c . && ls go-json.test"
